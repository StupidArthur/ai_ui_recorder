<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI UI Recorder - Dashboard</title>
  <style>
    /* ==================== 全局样式 ==================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden; /* 页面整体不滚动 */
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      display: flex;
      flex-direction: column;
    }

    /* ==================== 顶部标题栏 ==================== */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #52c41a;
      transition: background 0.3s;
    }

    .status-dot.recording { background: #ff4d4f; animation: pulse 1.5s infinite; }
    .status-dot.translating { background: #1890ff; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ==================== 操作栏 ==================== */
    .control-bar {
      background: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #e8e8e8;
      flex-wrap: wrap;
    }

    .control-bar label {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    .url-input {
      flex: 1;
      min-width: 300px;
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    .url-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
    .url-input:disabled { background: #f5f5f5; color: #999; }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-record {
      background: #52c41a;
      color: #fff;
    }
    .btn-record:hover:not(:disabled) { background: #389e0d; }

    .btn-stop {
      background: #ff4d4f;
      color: #fff;
    }
    .btn-stop:hover:not(:disabled) { background: #cf1322; }

    .btn-translate {
      background: #1890ff;
      color: #fff;
    }
    .btn-translate:hover:not(:disabled) { background: #096dd9; }

    .btn-refresh {
      background: #fff;
      color: #666;
      border: 1px solid #d9d9d9;
    }
    .btn-refresh:hover:not(:disabled) { color: #1890ff; border-color: #1890ff; }

    /* ==================== 主内容区 ==================== */
    .main-content {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
      min-height: 0; /* 关键：允许 flex 子项缩小到小于内容高度 */
    }

    /* ==================== 左列：控制台 ==================== */
    .console-panel {
      flex: 3;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e8e8e8;
      min-width: 0;
      min-height: 0; /* 关键：允许内部 flex 子项独立滚动 */
    }

    .panel-header {
      padding: 10px 16px;
      background: #fafafa;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
    }

    .panel-header .btn-clear {
      padding: 4px 10px;
      font-size: 12px;
      background: #fff;
      color: #999;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      cursor: pointer;
    }
    .panel-header .btn-clear:hover { color: #ff4d4f; border-color: #ff4d4f; }

    .console-output {
      flex: 1;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 12px 16px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .console-output .log-info { color: #4ec9b0; }
    .console-output .log-warn { color: #dcdcaa; }
    .console-output .log-error { color: #f44747; }
    .console-output .log-state { color: #569cd6; font-style: italic; }

    /* ==================== 右列：结果查阅 ==================== */
    .result-panel {
      flex: 2;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0; /* 关键：允许内部 flex 子项独立滚动 */
    }

    .runs-list {
      max-height: 280px;
      overflow-y: auto;
      border-bottom: 1px solid #e8e8e8;
    }

    .run-item {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 13px;
    }

    .run-item:hover { background: #e6f7ff; }
    .run-item.active { background: #bae7ff; }

    .run-item .run-title {
      font-weight: 500;
      color: #1890ff;
    }

    .run-item .run-meta {
      color: #999;
      font-size: 12px;
      margin-top: 2px;
    }

    .run-item .run-badges {
      margin-top: 4px;
      display: flex;
      gap: 6px;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      color: #fff;
    }

    .badge-meta { background: #722ed1; }
    .badge-steps { background: #13c2c2; }
    .badge-cases { background: #52c41a; }
    .badge-errors { background: #fa8c16; }
    .badge-midscene { background: #2f54eb; }
    .badge-selenium { background: #eb2f96; }

    /* 文件操作按钮组 */
    .file-actions {
      padding: 10px 16px;
      background: #fafafa;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .file-btn {
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
    }

    .file-btn:hover { color: #1890ff; border-color: #1890ff; }
    .file-btn.active { color: #1890ff; border-color: #1890ff; background: #e6f7ff; }
    .file-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 文件预览区 */
    .file-preview {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #fff;
      font-size: 13px;
      line-height: 1.7;
    }

    .file-preview .preview-placeholder {
      text-align: center;
      color: #bbb;
      margin-top: 60px;
      font-size: 14px;
    }

    .file-preview pre {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .file-preview .json-view {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    /* Markdown 渲染 */
    .file-preview .md-content h1 { font-size: 20px; margin: 16px 0 8px; border-bottom: 1px solid #eee; padding-bottom: 6px; }
    .file-preview .md-content h2 { font-size: 17px; margin: 14px 0 6px; }
    .file-preview .md-content h3 { font-size: 15px; margin: 12px 0 4px; }
    .file-preview .md-content p { margin: 6px 0; }
    .file-preview .md-content ul, .file-preview .md-content ol { padding-left: 20px; margin: 4px 0; }
    .file-preview .md-content strong { font-weight: 600; }
    .file-preview .md-content em { font-style: italic; }
    .file-preview .md-content code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
    }
    .file-preview .md-content blockquote {
      border-left: 3px solid #1890ff;
      padding: 4px 12px;
      margin: 8px 0;
      background: #f0f7ff;
      color: #555;
    }
    .file-preview .md-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 8px 0;
      font-size: 12px;
    }
    .file-preview .md-content th, .file-preview .md-content td {
      border: 1px solid #e8e8e8;
      padding: 6px 10px;
      text-align: left;
    }
    .file-preview .md-content th { background: #fafafa; font-weight: 500; }

    /* ==================== 底部署名 ==================== */
    .footer {
      text-align: right;
      padding: 8px 24px;
      font-size: 12px;
      color: #bbb;
      background: #fff;
      border-top: 1px solid #e8e8e8;
    }

    /* ==================== 空状态 ==================== */
    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 40px 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- 标题栏 -->
  <div class="header">
    <h1>AI UI Recorder</h1>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">空闲</span>
    </div>
  </div>

  <!-- 操作栏 -->
  <div class="control-bar">
    <label>目标 URL：</label>
    <input type="text" class="url-input" id="urlInput" placeholder="输入要录制的页面 URL">
    <button class="btn btn-record" id="btnRecord" onclick="startRecording()">开始录制</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>停止录制</button>
    <button class="btn btn-translate" id="btnTranslate" onclick="startTranslate()">AI 翻译</button>
    <button class="btn btn-refresh" id="btnRefresh" onclick="refreshRuns()">刷新列表</button>
  </div>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 左列：控制台 -->
    <div class="console-panel">
      <div class="panel-header">
        <span>实时控制台</span>
        <button class="btn-clear" onclick="clearConsole()">清空</button>
      </div>
      <div class="console-output" id="consoleOutput">
        <span class="log-state">[系统] Dashboard 已启动，等待操作...</span>
      </div>
    </div>

    <!-- 右列：结果查阅 -->
    <div class="result-panel">
      <div class="panel-header">
        <span>录制历史</span>
      </div>
      <div class="runs-list" id="runsList">
        <div class="empty-state">加载中...</div>
      </div>
      <div class="file-actions" id="fileActions" style="display: none;">
        <button class="file-btn" data-file="meta.json" onclick="loadFile('meta.json')">meta.json</button>
        <button class="file-btn" data-file="step_2_structured_steps.json" onclick="loadFile('step_2_structured_steps.json')">step_2_structured_steps.json</button>
        <button class="file-btn" data-file="step_2_structured_steps.errors.json" onclick="loadFile('step_2_structured_steps.errors.json')">step_2_structured_steps.errors.json</button>
        <button class="file-btn" data-file="AI_cases.md" onclick="loadFile('AI_cases.md')">AI_cases.md</button>
        <button class="file-btn" data-file="step_4_midscene_no_assert.yaml" onclick="loadFile('step_4_midscene_no_assert.yaml')">step_4_midscene_no_assert.yaml</button>
        <button class="file-btn" data-file="step_0_selenium_draft.py" onclick="loadFile('step_0_selenium_draft.py')">step_0_selenium_draft.py</button>
        <button class="file-btn" data-file="step_0_selenium_from_recording.py" onclick="loadFile('step_0_selenium_from_recording.py')">step_0_selenium_from_recording.py</button>
        <button class="file-btn" data-file="recorder.log" onclick="loadFile('recorder.log')">recorder.log</button>
        <button class="file-btn" data-file="preprocess.log" onclick="loadFile('preprocess.log')">preprocess.log</button>
        <button class="file-btn" data-file="generate.log" onclick="loadFile('generate.log')">generate.log</button>
      </div>
      <div class="file-preview" id="filePreview">
        <div class="preview-placeholder">选择左侧录制记录，查看文件内容</div>
      </div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer">designed by @yuzechao</div>

  <!-- ==================== JavaScript ==================== -->
  <script>
    // ==================== 状态管理 ====================
    let currentState = 'idle';
    let selectedRunId = null;
    let autoScroll = true;
    let seleniumExportEnabled = false;
    let runsById = {};

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const urlInput = document.getElementById('urlInput');
    const btnRecord = document.getElementById('btnRecord');
    const btnStop = document.getElementById('btnStop');
    const btnTranslate = document.getElementById('btnTranslate');
    const consoleOutput = document.getElementById('consoleOutput');
    const runsList = document.getElementById('runsList');
    const fileActions = document.getElementById('fileActions');
    const filePreview = document.getElementById('filePreview');
    const FILE_EXISTENCE_MAP = {
      'meta.json': 'hasMeta',
      'step_2_structured_steps.json': 'hasSteps',
      'step_2_structured_steps.errors.json': 'hasStepErrors',
      'AI_cases.md': 'hasCases',
      'step_4_midscene_no_assert.yaml': 'hasMidscene',
      'step_0_selenium_draft.py': 'hasSeleniumDraft',
      'step_0_selenium_from_recording.py': 'hasSeleniumFinal',
      'recorder.log': 'hasMeta',
      'preprocess.log': 'hasPreprocessLog',
      'generate.log': 'hasGenerateLog',
    };

    const STATE_LABELS = {
      idle: '空闲',
      recording: '录制中',
      translating: '翻译中',
    };

    /**
     * 更新界面状态
     * @param {string} state
     */
    function updateState(state) {
      currentState = state;
      statusDot.className = 'status-dot' + (state !== 'idle' ? ` ${state}` : '');
      statusText.textContent = STATE_LABELS[state] || state;

      const isIdle = state === 'idle';
      urlInput.disabled = !isIdle;
      btnRecord.disabled = !isIdle;
      btnStop.disabled = state !== 'recording';
      btnTranslate.disabled = !isIdle;
    }

    // ==================== SSE 日志连接 ====================

    let eventSource = null;

    function connectSSE() {
      if (eventSource) { eventSource.close(); }

      eventSource = new EventSource('/api/logs');

      eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'connected') {
            updateState(data.state);
            return;
          }

          if (data.type === 'state') {
            updateState(data.state);
            if (data.message) {
              appendLog('STATE', data.message);
            }
            // 翻译完成或录制完成后刷新列表
            if (data.state === 'idle') {
              refreshRuns();
            }
            return;
          }

          // 普通日志消息
          if (data.logLine) {
            appendLog(data.level, data.logLine);
          }
        } catch (_) {}
      };

      eventSource.onerror = () => {
        appendLog('ERROR', '[SSE] 连接断开，3 秒后重连...');
        setTimeout(connectSSE, 3000);
      };
    }

    // ==================== 控制台日志 ====================

    /**
     * 追加一行日志到控制台
     * @param {string} level
     * @param {string} text
     */
    function appendLog(level, text) {
      const span = document.createElement('span');
      const className = level === 'ERROR' ? 'log-error'
        : level === 'WARN' ? 'log-warn'
        : level === 'STATE' ? 'log-state'
        : 'log-info';
      span.className = className;
      span.textContent = text + '\n';
      consoleOutput.appendChild(span);

      // 限制控制台最大行数，防止 DOM 过大
      const MAX_LOG_LINES = 2000;
      while (consoleOutput.childNodes.length > MAX_LOG_LINES) {
        consoleOutput.removeChild(consoleOutput.firstChild);
      }

      // 自动滚动到底部（等 DOM 渲染完成后执行）
      if (autoScroll) {
        requestAnimationFrame(() => {
          consoleOutput.scrollTop = consoleOutput.scrollHeight;
        });
      }
    }

    function clearConsole() {
      consoleOutput.innerHTML = '';
      autoScroll = true; // 清空后恢复自动滚动
      appendLog('STATE', '[系统] 控制台已清空');
    }

    // 检测手动滚动：用户向上滚动时暂停自动滚动，滚回底部时恢复
    let scrollDebounce = false;
    consoleOutput.addEventListener('scroll', () => {
      if (scrollDebounce) return;
      scrollDebounce = true;
      requestAnimationFrame(() => {
        const { scrollTop, scrollHeight, clientHeight } = consoleOutput;
        autoScroll = (scrollHeight - scrollTop - clientHeight) < 50;
        scrollDebounce = false;
      });
    });

    // ==================== 录制控制 ====================

    async function startRecording() {
      const url = urlInput.value.trim();
      if (!url) {
        alert('请输入目标 URL');
        return;
      }

      try {
        updateState('recording');
        const resp = await fetch('/api/record/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const result = await resp.json();

        if (!resp.ok) {
          updateState('idle');
          appendLog('ERROR', `录制启动失败: ${result.error}`);
          return;
        }

        appendLog('STATE', `[系统] 录制已开始 → ${result.runDir}`);
      } catch (error) {
        updateState('idle');
        appendLog('ERROR', `录制启动失败: ${error.message}`);
      }
    }

    async function stopRecording() {
      try {
        const resp = await fetch('/api/record/stop', { method: 'POST' });
        const result = await resp.json();

        if (!resp.ok) {
          appendLog('ERROR', `停止录制失败: ${result.error}`);
          return;
        }

        appendLog('STATE', '[系统] 录制已手动停止');
      } catch (error) {
        appendLog('ERROR', `停止录制失败: ${error.message}`);
      }
    }

    // ==================== AI 翻译 ====================

    async function startTranslate() {
      try {
        updateState('translating');
        const body = selectedRunId ? { runId: selectedRunId } : {};

        const resp = await fetch('/api/translate/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const result = await resp.json();

        if (!resp.ok) {
          updateState('idle');
          appendLog('ERROR', `翻译启动失败: ${result.error}`);
          return;
        }

        appendLog('STATE', `[系统] AI 翻译已开始${selectedRunId ? ` (${selectedRunId})` : ' (最近一次录制)'}`);
      } catch (error) {
        updateState('idle');
        appendLog('ERROR', `翻译启动失败: ${error.message}`);
      }
    }

    // ==================== 录制历史 ====================

    async function refreshRuns() {
      try {
        const resp = await fetch('/api/runs');
        const { runs } = await resp.json();
        runsById = {};

        if (!runs || runs.length === 0) {
          runsList.innerHTML = '<div class="empty-state">暂无录制记录</div>';
          fileActions.style.display = 'none';
          filePreview.innerHTML = '<div class="preview-placeholder">暂无可查看的文件</div>';
          return;
        }

        runs.forEach(run => {
          runsById[run.id] = run;
        });

        runsList.innerHTML = runs.map(run => {
          const isActive = selectedRunId === run.id;
          const time = run.recordStartTime
            ? new Date(run.recordStartTime).toLocaleString('zh-CN')
            : run.id.replace('run_', '').replace(/T/, ' ').replace(/-/g, (m, i) => i > 9 ? ':' : '-');

          return `
            <div class="run-item${isActive ? ' active' : ''}" onclick="selectRun('${run.id}')">
              <div class="run-title">${run.id}</div>
              <div class="run-meta">${time} | ${run.totalActions} 个操作</div>
              <div class="run-badges">
                ${run.hasMeta ? '<span class="badge badge-meta">meta</span>' : ''}
                ${run.hasSteps ? '<span class="badge badge-steps">steps</span>' : ''}
                ${run.hasCases ? '<span class="badge badge-cases">cases</span>' : ''}
                ${run.hasStepErrors ? '<span class="badge badge-errors">step-errors</span>' : ''}
                ${run.hasMidscene ? '<span class="badge badge-midscene">midscene</span>' : ''}
                ${(run.hasSeleniumDraft || run.hasSeleniumFinal) ? '<span class="badge badge-selenium">selenium</span>' : ''}
              </div>
            </div>
          `;
        }).join('');

        // 选中的 run 已不存在时重置选择
        if (selectedRunId && !runsById[selectedRunId]) {
          selectedRunId = null;
          fileActions.style.display = 'none';
          filePreview.innerHTML = '<div class="preview-placeholder">选择左侧录制记录，查看文件内容</div>';
        } else if (selectedRunId) {
          updateFileButtonsByRun(selectedRunId);
        }
      } catch (error) {
        runsList.innerHTML = '<div class="empty-state">加载失败</div>';
      }
    }

    function selectRun(runId) {
      selectedRunId = runId;
      fileActions.style.display = 'flex';
      filePreview.innerHTML = '<div class="preview-placeholder">选择上方文件按钮查看内容</div>';

      // 刷新列表高亮
      document.querySelectorAll('.run-item').forEach(el => {
        el.classList.toggle('active', el.querySelector('.run-title').textContent === runId);
      });

      // 重置文件按钮状态
      document.querySelectorAll('.file-btn').forEach(el => el.classList.remove('active'));
      updateFileButtonsByRun(runId);
    }

    /**
     * 根据当前 run 产物存在性启用/禁用文件按钮
     * @param {string} runId
     */
    function updateFileButtonsByRun(runId) {
      const run = runsById[runId];
      const btns = document.querySelectorAll('.file-btn');
      btns.forEach(btn => {
        const fileName = btn.dataset.file;
        const flagKey = FILE_EXISTENCE_MAP[fileName];
        // 未配置映射时保持可点，配置了则按 run 标记决定
        const enabled = !flagKey || Boolean(run && run[flagKey]);
        btn.disabled = !enabled;
      });
    }

    // ==================== 文件查阅 ====================

    async function loadFile(fileName) {
      if (!selectedRunId) return;

      // 更新按钮状态
      document.querySelectorAll('.file-btn').forEach(el => {
        el.classList.toggle('active', el.dataset.file === fileName);
      });

      filePreview.innerHTML = '<div class="preview-placeholder">加载中...</div>';

      try {
        const resp = await fetch(`/api/runs/${selectedRunId}/file?path=${encodeURIComponent(fileName)}`);

        if (!resp.ok) {
          const err = await resp.json();
          filePreview.innerHTML = `<div class="preview-placeholder">文件不存在或加载失败: ${err.error || '未知错误'}</div>`;
          return;
        }

        const data = await resp.json();

        if (data.type === 'json') {
          filePreview.innerHTML = `<div class="json-view">${escapeHtml(JSON.stringify(data.content, null, 2))}</div>`;
        } else if (data.type === 'markdown') {
          filePreview.innerHTML = `<div class="md-content">${renderMarkdown(data.content)}</div>`;
        } else {
          filePreview.innerHTML = `<pre>${escapeHtml(data.content)}</pre>`;
        }
      } catch (error) {
        filePreview.innerHTML = `<div class="preview-placeholder">加载失败: ${error.message}</div>`;
      }
    }

    // ==================== Markdown 简易渲染 ====================

    /**
     * 简易 Markdown 渲染（不引入外部库）
     * 支持：标题、加粗、斜体、行内代码、代码块、列表、引用、表格、链接
     *
     * @param {string} md - Markdown 文本
     * @returns {string} HTML 字符串
     */
    function renderMarkdown(md) {
      let html = escapeHtml(md);

      // 代码块（```...```）
      html = html.replace(/```[\s\S]*?```/g, (match) => {
        const code = match.slice(3, -3).replace(/^\w*\n/, ''); // 去掉语言标识行
        return `<pre><code>${code}</code></pre>`;
      });

      // 表格
      html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (match, header, sep, body) => {
        const headers = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      // 标题
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // 引用
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

      // 无序列表
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

      // 加粗
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // 斜体
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // 行内代码
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // 链接
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

      // 段落（连续空行分段）
      html = html.replace(/\n{2,}/g, '</p><p>');
      html = '<p>' + html + '</p>';

      // 清理空段落
      html = html.replace(/<p>\s*<\/p>/g, '');
      html = html.replace(/<p>(<h[1-3]>)/g, '$1');
      html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<table>)/g, '$1');
      html = html.replace(/(<\/table>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ul>)/g, '$1');
      html = html.replace(/(<\/ul>)<\/p>/g, '$1');
      html = html.replace(/<p>(<blockquote>)/g, '$1');
      html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
      html = html.replace(/<p>(<pre>)/g, '$1');
      html = html.replace(/(<\/pre>)<\/p>/g, '$1');

      return html;
    }

    /**
     * HTML 转义
     * @param {string} text
     * @returns {string}
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== 初始化 ====================

    async function init() {
      // 获取初始状态
      try {
        const resp = await fetch('/api/status');
        const status = await resp.json();
        updateState(status.state);
        urlInput.value = status.defaultUrl || '';
        seleniumExportEnabled = Boolean(status.seleniumExportEnabled);
        appendLog('STATE', `[系统] Selenium 导出开关: ${seleniumExportEnabled ? '已开启' : '未开启'}`);
      } catch (_) {
        appendLog('ERROR', '[系统] 获取初始状态失败');
      }

      // 加载录制历史
      refreshRuns();

      // 连接 SSE
      connectSSE();
    }

    init();
  </script>
